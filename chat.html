<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鹿嶋パークホテルQ&Aチャット</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .chat-container {
      width: 360px;
      max-width: 95vw;
      height: 520px;
      max-height: 75dvh;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      background: #4376DF;
      color: white;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      gap: 8px;
    }
    .back-btn {
      cursor: pointer;
      font-size: 18px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: #fafafa;
    }
    .chat-message.user {
      margin: 6px 0;
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 95%;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.6;
      text-align: left;
      background: #d1f0d1;
      align-self: flex-end;
    }
    .chat-message.bot {
      margin: 6px 0;
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 95%;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.6;
      text-align: left;
      background: #f0f0f0;
      align-self: flex-start;
    }
    .chat-input-area {
      display: flex;
      border-top: 1px solid #ddd;
      padding: 6px;
      gap: 6px;
    }
    .user-input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    .mic-btn,
    .send-btn {
      width: 44px;
      height: 44px;
      padding: 0;
      border: none;
      border-radius: 8px;
      background: #0078d7;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .mic-btn.recording {
      color: #ff5252;
      position: relative;
    }
    .mic-btn.recording::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(255,82,82,0.6);
      animation: micPulse 1.5s infinite;
      pointer-events: none;
    }
    @keyframes micPulse {
      0% { box-shadow: 0 0 0 0 rgba(255,82,82,0.6); }
      70% { box-shadow: 0 0 0 10px rgba(255,82,82,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,82,82,0); }
    }
    @media screen and (max-width: 600px) {
      .chat-container {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: calc(100vw - 20px);
        max-width: calc(100vw - 20px);
      }
    }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <span class="back-btn" title="公式サイトへ戻る">◀</span>
    <h2>鹿嶋パークホテルQ&Aチャット</h2>
  </div>
  <div class="chat-messages"></div>
  <form id="chat-input-form" class="chat-input-area">
    <input type="text" id="user-input" placeholder="ここに質問を入力してください">
    <button type="submit" id="send-btn">送信</button>
    <button type="button" id="mic-btn">麦克风</button>
  </form>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/25.5.2/i18next.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/i18next-browser-languagedetector/8.2.0/i18nextBrowserLanguageDetector.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    i18next
      .init({
        resources: {
          ja: {
            translation: {
              siteHeader: '鹿嶋パークホテル',
              guidance: 'ご案内',
              checkinCheckout: 'チェックイン 15:00 / チェックアウト 10:00',
              facilities: '有料/提携駐車場・館内Wi-Fi完備',
              access: 'アクセス',
              accessDetails: '鹿島神宮駅より車で約10分',
              copyright: '© Central Hotel Group',
              chatHeaderText: '矢印クリックで公式サイトへ..<br>鹿嶋パークホテルQ&Aチャットです<br>質問は直接入力、スマホ音声入力対応！',
              send: '送信',
              noAnswer: '申し訳ありません。頂いたご質問にはまだ対応していません。0299-90-0500までお問い合わせください。',
              placeholders: [
                'ここに質問を入力してください',
                '音声入力はマイクをPush！',
                'チェックイン時の不明点や、',
                '駐車場、食事などお尋ね下さい',
                'お電話は0299-90-0500まで..'
              ]
            }
          },
        // その他の言語の翻訳は略しています。
        },
        lng: navigator.language || navigator.userLanguage,
        fallbackLng: 'ja',
        interpolation: {
          escapeValue: false
        }
      })
      .then(() => {
        document.querySelector('.chat-messages').innerHTML = i18next.t('noAnswer');
        
        const placeholders = i18next.t('placeholders', { returnObjects: true });
        let phIndex = 0;
        setInterval(() => {
          document.getElementById('user-input').placeholder = placeholders[phIndex];
          phIndex = (phIndex + 1) % placeholders.length;
        }, 3000);

        const form = document.querySelector('#chat-input-form');
        form.addEventListener('submit', event => {
          event.preventDefault();
          const userInput = document.getElementById('user-input').value.trim();
          if (userInput) {
            const chatMessagesDiv = document.querySelector('.chat-messages');
            const userMessageDiv = document.createElement('div');
            userMessageDiv.classList.add('chat-message', 'user');
            userMessageDiv.textContent = userInput;
            chatMessagesDiv.appendChild(userMessageDiv);
            document.getElementById('user-input').value = '';
          }
        });
      });
  });
</script>
</body>
</html>
