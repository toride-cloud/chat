    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #bg-layer {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      background: #ffffff;
      z-index: 0;
      pointer-events: none;
    }
    .site-header {
      background: #2e7d32;
      color: #fff;
      padding: 16px;
    }
    .site-main {
      padding: 16px;
      line-height: 1.8;
    }
    .site-footer {
      padding: 16px;
      background: #f0f0f0;
      font-size: 12px;
    }
    #chat-layer {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(4px);
    }
    #chatbox {
      width: 360px;
      max-width: 95vw;
      height: 520px;
      max-height: 75dvh;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #chatHeader {
      background: #2e7d32;
      color: white;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      gap: 8px;
    }
    #chatHeader .backBtn {
      cursor: pointer;
      font-size: 18px;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: #fafafa;
    }
    .msg {
      margin: 6px 0;
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 95%;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.6;
      text-align: left;
    }
    .user {
      background: #d1f0d1;
      align-self: flex-end;
    }
    .bot {
      background: #f0f0f0;
      align-self: flex-start;
    }
    #inputArea {
      display: flex;
      border-top: 1px solid #ddd;
      padding: 6px;
      gap: 6px;
    }
    #userInput {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    #micBtn,
    #sendBtn {
      width: 44px;
      height: 44px;
      padding: 0;
      border: none;
      border-radius: 8px;
      background: #2e7d32;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #micBtn.recording {
      color: #ff5252;
      position: relative;
    }
    #micBtn.recording::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(255,82,82,0.6);
      animation: micPulse 1.5s infinite;
      pointer-events: none;
    }
    @keyframes micPulse {
      0% { box-shadow: 0 0 0 0 rgba(255,82,82,0.6); }
      70% { box-shadow: 0 0 0 10px rgba(255,82,82,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,82,82,0); }
    }
    @media screen and (max-width: 600px) {
      #chatbox {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: calc(100vw - 20px);
        max-width: calc(100vw - 20px);
      }
