<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>セントラルホテルグループQ&Aチャット</title>
  <!-- i18next CDN追加 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/25.5.2/i18next.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next-browser-languagedetector/8.2.0/i18nextBrowserLanguageDetector.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #bg-layer {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      background: #ffffff;
      z-index: 0;
      pointer-events: none;
    }
    .site-header {
      background: #4376DF;
      color: #fff;
      padding: 16px;
    }
    .site-main {
      padding: 16px;
      line-height: 1.8;
    }
    .site-footer {
      padding: 16px;
      background: #f0f0f0;
      font-size: 12px;
    }
    #chat-layer {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(4px);
    }
    #chatbox {
      width: 360px;
      max-width: 95vw;
      height: 520px;
      max-height: 75dvh;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #chatHeader {
      background: #4376DF;
      color: white;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      gap: 8px;
    }
    #chatHeader .backBtn {
      cursor: pointer;
      font-size: 18px;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: #fafafa;
    }
    .msg {
      margin: 6px 0;
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 95%;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.6;
      text-align: left;
    }
    .user {
      background: #d1f0d1;
      align-self: flex-end;
    }
    .bot {
      background: #f0f0f0;
      align-self: flex-start;
    }
    #inputArea {
      display: flex;
      border-top: 1px solid #ddd;
      padding: 6px;
      gap: 6px;
    }
    #userInput {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    #micBtn,
    #sendBtn {
      width: 44px;
      height: 44px;
      padding: 0;
      border: none;
      border-radius: 8px;
      background: #0078d7;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #micBtn.recording {
      color: #ff5252;
      position: relative;
    }
    #micBtn.recording::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(255,82,82,0.6);
      animation: micPulse 1.5s infinite;
      pointer-events: none;
    }
    @keyframes micPulse {
      0% { box-shadow: 0 0 0 0 rgba(255,82,82,0.6); }
      70% { box-shadow: 0 0 0 10px rgba(255,82,82,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,82,82,0); }
    }
    @media screen and (max-width: 600px) {
      #chatbox {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: calc(100vw - 20px);
        max-width: calc(100vw - 20px);
      }
    }
  </style>
</head>
<body>
<div id="bg-layer">
  <header class="site-header">
    <h1 data-i18n="siteHeader">鹿嶋パークホテル</h1>
  </header>
  <main class="site-main">
    <h2 data-i18n="guidance">ご案内</h2>
    <p data-i18n="checkinCheckout">チェックイン 15:00 / チェックアウト 10:00</p>
    <p data-i18n="facilities">有料/提携駐車場・館内Wi-Fi完備</p>
    <h2 data-i18n="access">アクセス</h2>
    <p data-i18n="accessDetails">鹿島神宮駅より車で約10分</p>
  </main>
  <footer class="site-footer">
    <span data-i18n="copyright">© Central Hotel Group</span>
  </footer>
</div>
<div id="chat-layer">
<div id="chatbox">
  <div id="chatHeader">
    <span class="backBtn" title="公式サイトへ戻る">◀</span>
    <div data-i18n="chatHeaderText">
      矢印クリックで公式サイトへ..<br>
      鹿嶋パークホテルQ&Aチャットです<br>
      質問は直接入力、スマホ音声入力対応！
    </div>
  </div>
  <div id="messages"></div>
  <div id="inputArea">
    <input id="userInput" placeholder="">
    <button id="micBtn">🎤</button>
    <button id="sendBtn" data-i18n="send">送信</button>
  </div>
</div>
</div>
<script>
document.addEventListener("contextmenu", function(e){ e.preventDefault(); });
document.addEventListener("selectstart", function(e){ e.preventDefault(); });
document.addEventListener("keydown", function(e){
  if ((e.ctrlKey && ["c","u","s","p","a"].includes(e.key.toLowerCase())) || e.key === "F12"){
    e.preventDefault();
  }
});
document.querySelector(".backBtn").onclick = () => {
  window.location.href = "https://www.kashimaparkhotel.com/";
};

const faq = {
  ja: [
    {keywords:["チェックイン","ちぇっくいん","checkin","check-in"], answer:"チェックイン時間は宿泊当日15:00〜です。早めのチェックインをご希望の際は有償によるご対応が可能です。"},
    {keywords:["チェックアウト","ちぇっくあうと","check","out","check-out"], answer:"チェックアウトは10:00までにお願いいたします。レイトチェックアウトは空室状況により有料で可能です。"}
  ],
  en: [
    {keywords: ["check-in", "checkin", "time", "what time"], answer: "Check-in starts at 3:00 PM. Early check-in is available on a chargeable basis depending on room availability. Please come to the front desk on the 2nd floor."},
    {keywords: ["check-out", "checkout", "out"], answer: "Check-out is requested by 10:00 AM. Extension of stay is possible on a chargeable basis depending on room availability. Please inform the front desk on the 2nd floor."}
  ],
  zh: [
    {keywords: ["入住", "登记", "时间", "几点", "入住时间"], answer: "入住时间从下午3:00开始。根据房况，可提供付费提前入住服务。请到2楼前台办理。"},
    {keywords: ["退房", "离开", "退房时间"], answer: "退房时间为上午10:00之前。根据房况，可提供付费延迟退房服务。请提前告知2楼前台。"}
  ],
  'zh-CN': [ /* 同zh */ ],
  'zh-TW': [ /* 同zh-TW */ ],
  'zh-HK': [ /* 同zh-HK */ ],
  vi: [
    {keywords: ["trả phòng", "nhận phòng", "thời gian", "mấy giờ", "thời gian đến"], answer: "Nhận phòng bắt đầu từ 3:00 PM. Nhận phòng sớm có sẵn với phí tùy theo tình trạng phòng trống. Vui lòng đến quầy lễ tân ở tầng 2."},
    {keywords: ["trả phòng", "trả phòng", "ra ngoài", "quá hạn lưu trú"], answer: "Trả phòng được yêu cầu trước 10:00 AM. Gia hạn lưu trú có thể với phí tùy theo tình trạng phòng trống. Vui lòng thông báo cho quầy lễ tân ở tầng 2."}
  ],
  th: [
    {keywords: ["เช็คเอาท์", "เช็คอิน", "เวลา", "กี่โมง", "เวลาถึง"], answer: "การเช็คอินเริ่มต้นเวลา 15:00 น. การเช็คอินก่อนเวลามีให้บริการโดยมีค่าธรรมเนียมขึ้นอยู่กับความพร้อมของห้องพัก กรุณามาที่แผนกต้อนรับชั้น 2"},
    {keywords: ["เช็คเอาท์", "เช็คเอาท์", "ออก", "เกินกำหนด"], answer: "ขอเช็คเอาท์ก่อน 10:00 น. สามารถขยายเวลาพักได้โดยมีค่าธรรมเนียมขึ้นอยู่กับความพร้อมของห้องพัก กรุณาแจ้งแผนกต้อนรับชั้น 2"}
  ]
];

function findAnswer(query){
  query = query.toLowerCase();
  const detectedLang = i18next.language || 'ja';
  const baseLang = detectedLang.split('-')[0];
  const lang = faq[detectedLang] ? detectedLang : (faq[baseLang] ? baseLang : 'ja');
  const faqList = faq[lang] || faq.ja;
  for(const item of faqList){
    for(const kw of item.keywords){
      if(query.includes(kw.toLowerCase())) return item.answer;
    }
  }
  return i18next.t('noAnswer');
}

const messages = document.getElementById("messages");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");

function addBotMessageTypewriter(text){
  const div = document.createElement("div");
  div.className = "msg bot";
  messages.appendChild(div);
  let i = 0;
  const timer = setInterval(()=>{
    div.textContent += text.charAt(i++);
    messages.scrollTop = messages.scrollHeight;
    if(i >= text.length) clearInterval(timer);
  }, 25);
}

function addMessage(msg, isUser=false){
  if(isUser){
    const div = document.createElement("div");
    div.className = "msg user";
    div.textContent = msg;
    messages.appendChild(div);
  }else{
    addBotMessageTypewriter(msg);
  }
  messages.scrollTop = messages.scrollHeight;
}

sendBtn.onclick = () => {
  const msg = userInput.value.trim();
  if(!msg) return;
  addMessage(msg, true);
  setTimeout(()=>addMessage(findAnswer(msg)), 100);
  userInput.value = "";
};

userInput.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    e.preventDefault();
    sendBtn.click();
  }
});

let recognition = null;
let isRecording = false;
if(window.SpeechRecognition || window.webkitSpeechRecognition){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.onstart = ()=>{
    isRecording = true;
    micBtn.classList.add("recording");
    micBtn.textContent = "●";
  };
  recognition.onend = recognition.onerror = ()=>{
    isRecording = false;
    micBtn.classList.remove("recording");
    micBtn.textContent = "🎤";
  };
  recognition.onresult = e=>{
    userInput.value = e.results[0][0].transcript;
    sendBtn.click();
  };
}

function startVoice(){
  const ua = navigator.userAgent;
  if(ua.includes("Edg/")){
    alert("Edgeでは音声入力は利用できません。\nChrome または Safari をご利用ください。");
    return;
  }
  if(!recognition){
    alert("このブラウザでは音声入力に対応していません。");
    return;
  }
  if(isRecording) return;
  try{ recognition.start(); }catch(e){}
}

micBtn.onclick = startVoice;
micBtn.addEventListener("pointerdown", e=>{
  e.preventDefault();
  startVoice();
});

const AUTO_CLOSE_TIME = 180000;
let autoTimer = null;
function resetTimer(){
  clearTimeout(autoTimer);
  autoTimer = setTimeout(()=>{
    window.location.href = "https://www.kashimaparkhotel.com/";
  }, AUTO_CLOSE_TIME);
}
["click","keydown","mousemove","scroll","pointerdown"].forEach(ev=>{
  document.addEventListener(ev, resetTimer, { passive:true });
});
resetTimer();
