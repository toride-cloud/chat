<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>セントラルホテルグループQ&Aチャット</title>
  <!-- i18next CDN追加 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/25.5.2/i18next.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/i18next-browser-languagedetector/8.2.0/i18nextBrowserLanguageDetector.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #bg-layer {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      background: #ffffff;
      z-index: 0;
      pointer-events: none;
    }
    .site-header {
      background: #2e7d32;
      color: #fff;
      padding: 16px;
    }
    .site-main {
      padding: 16px;
      line-height: 1.8;
    }
    .site-footer {
      padding: 16px;
      background: #f0f0f0;
      font-size: 12px;
    }
    #chat-layer {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(4px);
    }
    #chatbox {
      width: 360px;
      max-width: 95vw;
      height: 520px;
      max-height: 75dvh;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #chatHeader {
      background: #2e7d32;
      color: white;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      gap: 8px;
    }
    #chatHeader .backBtn {
      cursor: pointer;
      font-size: 18px;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: #fafafa;
    }
    .msg {
      margin: 6px 0;
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 95%;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.6;
      text-align: left;
    }
    .user {
      background: #d1f0d1;
      align-self: flex-end;
    }
    .bot {
      background: #f0f0f0;
      align-self: flex-start;
    }
    #inputArea {
      display: flex;
      border-top: 1px solid #ddd;
      padding: 6px;
      gap: 6px;
    }
    #userInput {
      flex: 1;
      height: 44px;
      padding: 0 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
    #micBtn,
    #sendBtn {
      width: 44px;
      height: 44px;
      padding: 0;
      border: none;
      border-radius: 8px;
      background: #2e7d32;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #micBtn.recording {
      color: #ff5252;
      position: relative;
    }
    #micBtn.recording::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(255,82,82,0.6);
      animation: micPulse 1.5s infinite;
      pointer-events: none;
    }
    @keyframes micPulse {
      0% { box-shadow: 0 0 0 0 rgba(255,82,82,0.6); }
      70% { box-shadow: 0 0 0 10px rgba(255,82,82,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,82,82,0); }
    }
    @media screen and (max-width: 600px) {
      #chatbox {
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        width: calc(100vw - 20px);
        max-width: calc(100vw - 20px);
      }
    }
  </style>
</head>
<body>
<div id="bg-layer">
  <header class="site-header">
    <h1 data-i18n="siteHeader">セントラルホテル取手</h1>
  </header>
  <main class="site-main">
    <h2 data-i18n="guidance">ご案内</h2>
    <p data-i18n="checkinCheckout">チェックイン 15:00 / チェックアウト 10:00</p>
    <p data-i18n="facilities">無料駐車場・館内Wi-Fi完備</p>
    <h2 data-i18n="access">アクセス</h2>
    <p data-i18n="accessDetails">矢田部ＩＣより車で約30分</p>
  </main>
  <footer class="site-footer">
    <span data-i18n="copyright">© Central Hotel Group</span>
  </footer>
</div>
<div id="chat-layer">
<div id="chatbox">
  <div id="chatHeader">
    <span class="backBtn" title="公式サイトへ戻る">◀</span>
    <div data-i18n="chatHeaderText">
      矢印クリックで公式サイトへ..<br>
      セントラルホテル取手Q&Aチャットです<br>
      質問は直接入力、スマホ音声入力対応！
    </div>
  </div>
  <div id="messages"></div>
  <div id="inputArea">
    <input id="userInput" placeholder="">
    <button id="micBtn">🎤</button>
    <button id="sendBtn" data-i18n="send">送信</button>
  </div>
</div>
</div>
<script>
document.addEventListener("contextmenu", function(e){
  e.preventDefault();
});
document.addEventListener("selectstart", function(e){
  e.preventDefault();
});
document.addEventListener("keydown", function(e){
  if (
    (e.ctrlKey && ["c","u","s","p","a"].includes(e.key.toLowerCase())) ||
    e.key === "F12"
  ){
    e.preventDefault();
  }
});

window.addEventListener('load', function() {
  if (history && history.replaceState) {
    history.replaceState(null, '', '/セントラルホテルグループQAチャット');
  }
});

document.querySelector(".backBtn").onclick = () => {
  window.location.href = "https://www.centralhoteltoride.com/";
};
const faq = {
  ja: [
  {keywords:["チェックイン","ちぇっくいん","時間","何時","check","in","check-in"], answer:"チェックインは15:00からとなります。早めのお時間からのチェックインは空室状況により有料で承っております。２階フロントまでお越しください。"},
  {keywords:["チェックアウト","ちぇっくあうと","check","out","check-out"], answer:"チェックアウトは10:00までにお願いいたします。滞在時間の延長は空室状況により有料で可能です。２階フロントまでお知らせください。"},
  {keywords:["アーリー","早い","早く入れる","あーりー"], answer:"アーリーチェックインは空室状況により有料にて承らせていただきます。料金等は事前にお問い合わせください。"},
  {keywords:["レイト","遅い","遅く出る","遅く","れいと","遅め"], answer:"レイトチェックアウトは空室状況により有料で承らせていただきます。料金等は事前にお問い合わせください。"},
  {keywords:["駐車","パーキング","ちゅうしゃじょう","自動車"], answer:"ホテル滞在中のお客様は無料駐車場をご利用いただけますが、台数に限りがあるためご予約は承れません。駐車場は先着順となります。バス、トラックなど大型の車種（大きさ、長さ）によっては事前にご連絡頂ければ駐車場のご予約も可能です。宿泊ホテルに直接お電話いただければ幸いです。"},
  {keywords:["Wi-Fi","wifi","WiFi","ワイファイ","わいふぁい","インターネット","ネット","無線","有線","ねっと","LAN","ＬＡＮ"], answer:"館内は無料にてWi-Fiをご利用いただけます。SSID、パスワードは各お部屋内デスク前にある鏡の右下に掲示しております。電波の強いものからお繋ぎください。有線LANはお部屋数に限りがありますので事前にご連絡下さいませ。フロントにて無料Wi-Fiをお使いいただく場合はフロントスタッフにお尋ねください。"},
  {keywords:["朝食","朝ごはん","モーニング","ビュッフェ"], answer:"ご朝食はAM6：30～AM9：00の間で２階フロント前にてお渡し致しております。お受け取り後お部屋でお召し上がり下さい。食事後の容器は廊下に置いておいてください。（朝食はサービス中にて料金は頂いておりませんが予告なく終了する場合もございます。ご了承ください。）"},
  {keywords:["夕食","晩ごはん","ディナー"], answer:"ご夕食は承っておりません。２階フロントにて近隣の飲食店マップをお渡しいたしますのでご活用ください。"},
  {keywords:["室内電話","内線電話","スタッフ"], answer:"室内設置のお電話は外線通話はできません。他の客室への内線通話をご利用の際は、対象部屋の４桁の部屋番号を押して下さい。フロントスタッフ宛の内線は「９番」を押して下さい。"},
  {keywords:["モーニングコール","目覚まし","時計"], answer:"お部屋に設置の受話器をお取りになり、「80」を押してからアラーム設定時間を４桁押して下さい（例・8時15分予定の場合は、0815）尚、モーニングコールの解除は「81」、モーニングコールの確認は「82」となります。"},
  {keywords:["カギ","鍵","るーむきー","ルームキー"], answer:"オートロックとなっておりますので、お部屋からお出かけの際は、必ずルームキーを携帯し施錠の確認をお願いします。外出の際はルームキーをフロントにお預けください。"},
  {keywords:["貴重品","お預かり品","あずかり"], answer:"貴重品は２階フロントにてお預かりも可能です。必ず「預かり証」をお受け取りください。「預かり証」をお持ちいただけないと直ぐにお渡しできない場合がございます。"},
  {keywords:["空調","冷房","暖房","エアコン","えあこん"], answer:"館内一括空調（冷房または暖房）になります。温度設定は出来ません。枕元にある丸い摘みを回すことにより、風量に調節が可能です。"},
  {keywords:["避難経路","逃げる","火事","火災","地震","じしん"], answer:"避難経路のご案内図をお部屋のドア内側に提示しております。必ず確認しておいてください。"},
  {keywords:["くりーにんぐ","クリーニング"], answer:"現在承ってございません。申し訳ありませんがお客様の方でお近くのクリーニング店へご依頼ください。"},
  {keywords:["連泊中","清掃","ルームクリーニング"], answer:"清掃はAM10：00～となります。３日に一度は清掃を行わせていただきますのでご了承お願い致します。清掃不要やお時間の変更はPM1：00までにフロント「９番」までご連絡ください。ドア内側にある赤札、白札での掲示も可能です。飲み残し、ゴミ箱内は処分させていただきますので、捨ててはいけない物はメモ帳にてご提示ください。"},
  {keywords:["お湯","飲み水","水道水","フリードリンク","ウェルカムドリンク","コーヒー","お茶","紅茶","麦茶"], answer:"お部屋のお水（水道水）は飲料としてお使いいただけます。お湯を沸かす場合は備え付けのポットまたはティーサーバーをご利用ください。２階にはウェルカムドリンクコーナーも設置しており無料にてお楽しみいただけます。（ウェルカムドリンクコーナーは予告なく終了する場合もございます。ご了承ください。）"},
  {keywords:["宅配便","たっきゅうびん","宅急便","お荷物","にもつ","はいそう","配送"], answer:"２階フロントにてお預かりが可能です。お荷物のお届け配送につきましては「ヤマト急便」のみの取り扱いとなります。事前にホテル宛にお荷物などお送りいただく場合は「お名前」「宿泊日」を明記のお電話にて一報いただけますと幸いです。着払いはお受けできませんのでご了承お願い致します。"},
  {keywords:["貸し出し品","かしだし","れんたる","レンタル"], answer:"電気スタンド、加湿器、毛布、携帯電話充電器、アイロン、アイロン台、ズボンプレッサー、爪切り、毛抜き、ソーイングセット、体温計、筆記用具、ハンガー、水枕、アイスペール、ワインオープナー、栓抜き、スプーン、フォーク、お皿などがございますので、ご利用の際は２階フロントまでご連絡ください。"},
  {keywords:["差し上げ","さしあげ","おわたし","お渡し","レディース","女性"], answer:"女性向けアメニティ（クシ、ヘアブラシ、ボディスポンジ、各種ジェル、綿棒、入浴剤、フェイスパックetc）の入ったセットをお渡しさせていただきます。また、電車などの時刻表（取手発）、近隣の飲食店マップもございますのでご利用ください。"},
  {keywords:["のし袋","のしぶくろ","くつした","靴下","ストッキング","プリンタ"], answer:"のし袋、靴下、ストッキング、傘、ベルト、プリンタ用紙など有料となりますが２階フロントにて承っております。"},
  {keywords:["ルームサービス","うーばー","ウーバー","ピザ"], answer:"ルームサービスは承れません。また、外部よりご購入いただいた飲食物（ピザ、丼ものetc）はお部屋までお届けは出来ません。２階フロント前での受け渡しとなりますので２階までお越しください。"},
  {keywords:["浴衣","ゆかた","ねまき","寝間着","室内","スリッパ"], answer:"お部屋にご用意しております浴衣、スリッパなどでロビーでの滞在及び外出は出来ませんのでご了承ください。"},
  {keywords:["ヘヤドライア","ヘアドライヤ"], answer:"ヘアードライヤーは入口ドア傍の洋服掛け（クローゼット）の場所にございます。消臭剤、スリッパ、靴ベラ等もございますのでご利用ください。"},
  {keywords:["冷蔵庫","れいぞう","れいとう","冷凍"], answer:"シングルルーム、ツインルームはデスク下に、デラックスシングルルームはテレビ台下にございます。和室のお部屋はクローゼット横にございますのでご利用ください。（冷凍は出来ません。）"},
  {keywords:["自販機","じはんき","自動販売","じどうはんばい","ジュース","温め","れんじ","レンジ","さけ","酒"], answer:"自動販売機コーナーは、２階、４階、８階にございます。氷をご希望の方は４階製氷機をご利用ください。電子レンジも２階、４階、８階に同じく設置しております。"},
  {keywords:["コインランドリー","洗濯機"], answer:"４階、８階にランドリーコーナー、自販機コーナーがございます。洗濯機はお金を投入すると洗剤は自動投入となります。両替等ご希望の際は２階フロントまでお越しください。"},
  {keywords:["新聞","しんぶん","ニュース"], answer:"２階フロントにて閲覧可能な新聞（日経、朝日、スポーツ）がございます。朝刊の読売新聞はお部屋までお持ち帰り頂けます。（朝刊の新聞に関しましてはお断りなく廃止する場合がございますのでご了承ください。）"},
  {keywords:["こぴー","コピー","FAX","fax"], answer:"有料になりますが２階フロントにて承っております。"},
  {keywords:["支払い","カード","クレジット","visa","マスター","現金"], answer:"お支払方法は、現金、クレジットカード（VISA、マスター）、QR決済（メルペイ、D払い）などのお支払方法からお選びいただけます。"},
  {keywords:["駐輪場", "自転車", "バイク", "二輪", "２輪", "オートバイ"], answer:"ご宿泊期間中のご利用に限り、地下駐車場の一番奥の駐輪場（自転車、オートバイ）がご利用いただけます。地下駐車場より2階フロントまではエレベーターがご利用いただけます。"},
  {keywords:["キツエン", "喫煙", "きつえん", "煙草", "吸う"], answer:"館内にタバコの販売機・喫煙場所はございません。喫煙場所をお探しの際は取手駅の喫煙所（徒歩3分位）をご案内させて頂いております。館内全体では喫煙ルーム（48室・ツイン、DXシングル含む）禁煙ルーム（72室・ツイン、DXシングル含む）がございます。禁煙指定のお部屋による喫煙を発見した場合は「特別清掃費、不売日数分の補償」をご請求させていただく場合がございます。"},
  {keywords:["キンエン", "禁煙", "きんえん", "くさい", "臭い", "部屋数"], answer:"館内全体では禁煙ルーム（72室・ツイン、DXシングル含む）喫煙ルーム（48室・ツイン、DXシングル含む）がございます。喫煙指定部屋以外は館内全て禁煙となりますがエレベーター、自販機・洗濯室など多くの方がご利用いただく場所では臭いが気になる場合はございます。禁煙指定のお部屋による喫煙を発見した場合は「特別清掃費、不売日数分の補償」をご請求させていただく場合がございます。"},
  {keywords: ["ベッド", "サイズ", "広さ", "ひろさ", "大きさ", "部屋タイプ", "部屋の種類"], answer: "お部屋の広さは和室・ツインルームが24㎡、DXシングルルームが15.4㎡、シングルルームが12㎡になります。各ベッドサイズはツインルームが（シングルベッドサイズ、1030mm×1970mm）が2台入り、DXシングルルーム（ダブルベッドサイズ、1400mm×1970mm）が1台、シングルルーム（セミダブルサイズ、1230mm×1970mm）が1台の設置になります。ご不明な点等ございましたら事前にお問い合わせください。"},
  {keywords: ["エレベータ", "階段", "門限"], answer: "エレベーターの利用におきましては午前0時から午前5時30分までは、セキュリティ上の理由で2階より下には降りません。午前0時以降のチェックインの場合は、階段を使って2階のフロントまでお越しください。"},
  {keywords: ["おすすめ", "近く", "周辺", "観光", "遊ぶ", "見る", "イベント", "行事", "催し", "遊び"], answer: "ホテル裏手に長禅寺、夏は取手花火大会。取手市民会館では多々イベント(コンサート、漫才、演劇、映画など)が行われています。少し足を延ばすと牛久大仏・牛久沼、つくばエキスポセンターなどもあります。"},
  {keywords: ["住所", "場所"], answer: "当館の場所は、〒302-0004、茨城県取手市取手2-4-3、TEL.0297-72-1123、FAX.0297-72-7788 になります。"},
  {keywords: ["キャンセル", "キャンセル料", "いつまで", "何日前"], answer: "個人でのご宿泊につきましては宿泊前日のキャンセルは宿泊料金の20％、ご宿泊当日15時までにキャンセルご連絡いただいた場合は宿泊料金の80％を頂戴いたします。宿泊当日15時以降、及びご連絡が無い場合は宿泊料金の100％を頂戴致します。"},
  {keywords: ["マッサージ", "あんま"], answer: "マッサージの申込・予約等はお受けできません。取手駅東口にタイマッサージアンチェラ、祥和堂ソフトマッサージ、西口に、ほぐし家将がございますのでご利用ください。"},
  {keywords: ["コンビニ", "ローソン", "セブン"], answer: "取手駅東口のローソンまで徒歩3分です。セブンイレブンまで5分くらいになります。"},
  {keywords: ["駅", "アクセス", "電車", "最寄り駅", "改札", "出口"], answer: "「JR取手駅」が最寄り駅になります。東口改札を出て右手側に在るローソン先の信号を渡り右方向へお進みください。徒歩約3分くらいで当ホテルに着きます。上野・品川方面行は前寄り、土浦・水戸方面行は後ろ寄りにご乗車いただくと「東口改札」出口に近くなります。迷われた場合は 0297-72-1123 までご連絡ください。"},

{

{

{

{
"keywords": ["room phone", "internal phone", "staff"],

{

"answer": "Pick up the receiver in your room, dial '80', then enter the alarm time in 4 digits (e.g., 0815 for 8:15 AM). To cancel the morning call, dial '81'; to check, dial '82'."
},
{
"keywords": ["key", "room key"],
"answer": "The rooms have auto-locks, so please carry your room key and confirm the door is locked when leaving. When going out, please deposit the room key at the front desk."

{

"answer": "Valuables can be deposited at the front desk on the 2nd floor. Please be sure to receive the deposit receipt. Without the receipt, we may not be able to return items immediately."
},
{
"keywords": ["air conditioning", "aircondition", "cooling", "heating", "AC"],
"answer": "The hotel uses centralized air conditioning (cooling or heating). Temperature settings are not adjustable. You can adjust the airflow by turning the round knob by the pillow."
},
{
"keywords": ["evacuation route", "evacuation", "escape", "fire", "earthquake"],
"answer": "The evacuation route map is posted on the inside of the room door. Please be sure to check it."
},
{
"keywords": ["cleaning", "laundry"],
"answer": "We are currently not accepting laundry services. We apologize for the inconvenience, but please use a nearby laundry shop."
},
{
"keywords": ["consecutive stay", "room cleaning", "roomcleaning", "house keep", "housekeep"],
"answer": "Cleaning starts at 10:00 AM. We perform cleaning every three days, so we appreciate your understanding. If you do not need cleaning or wish to change the time, please contact the front desk at '9' by 1:00 PM. You can also indicate with the red or white signs inside the door. Leftover drinks and trash will be disposed of, so please note any items not to discard on the memo pad."
},
{
"keywords": ["hot water", "drinking water", "tap water", "free drink", "welcome drink", "barley tea"],
"answer": "The room's water (tap water) is safe for drinking. To boil water, use the provided pot or tea server. There is also a complimentary welcome drink corner on the 2nd floor for your enjoyment. (The welcome drink corner may end without prior notice. We appreciate your understanding.)"
},
{
"keywords": ["delivery", "parcel", "luggage", "shipping"],
"answer": "We can handle parcels at the front desk on the 2nd floor. For delivery, we only handle Yamato Express. If sending luggage to the hotel in advance, please include your name and stay date, and call us beforehand. We cannot accept collect-on-delivery shipments."
},
{
"keywords": ["lending","lending items", "rental"],
"answer": "We have desk lamps, humidifiers, blankets, mobile chargers, irons, ironing boards, trouser pressers, nail clippers, tweezers, sewing sets, thermometers, writing utensils, pillows, ice pillows, ice pails, wine openers, bottle openers, spoons, forks, plates, etc. Please contact the front desk on the 2nd floor if needed."
},
{
"keywords": ["provide", "ladies", "women"],
"answer": "We provide a set of ladies' amenities (comb, hairbrush, body sponge, various gels, cotton swabs, bath salts, face pack, etc.). We also have train timetables (from Toride) and nearby restaurant maps available."
},
{
"keywords": ["coffee", "black tea", "tea"],
"answer": "There is a complimentary welcome drink corner on the 2nd floor for your enjoyment. (The welcome drink corner may end without prior notice. We appreciate your understanding.)"
},
{
"keywords": ["gift envelope", "socks", "stockings", "printer"],
"answer": "Gift envelopes, socks, stockings, umbrellas, belts, printer paper, etc., are available for a fee at the front desk on the 2nd floor."
},
{
"keywords": ["room service","roomservice", "uber", "pizza"],
"answer": "We do not offer room service. Food and drinks purchased externally (pizza, bowls, etc.) cannot be delivered to rooms. Please receive them at the front desk on the 2nd floor."
},
{
"keywords": ["yukata", "nightwear", "indoor", "slippers"],
"answer": "Please note that yukata and slippers provided in the room cannot be used for wandering in the lobby, staying, or going outside."
},
{
"keywords": ["hair dryer", "hairdryer"],
"answer": "The hair dryer is located near the entrance door in the closet area. Deodorizers, slippers, shoe horns, etc., are also available there."
},
{
"keywords": ["refrigerator", "fridge", "freezer"],

},
{
"keywords": ["vending machine", "juice", "warm", "microwave", "alcohol"],

{
"keywords": ["coin laundry","coinlaundry", "washing machine", "washingmachine"],
"answer": "Laundry corners and vending machines are on the 4th and 8th floors. Detergent is automatically dispensed when coins are inserted into the washing machine. For change, please come to the front desk on the 2nd floor."

{

{
"keywords": ["massage"],
"answer": "We are not currently offering massage services. Please use nearby services like Thai Massage Anjera or Showa-do Soft Massage at Toride Station East Exit, or Hogushi-ya Sho at West Exit."

{

{

{

"answer": "During your stay, you can use the bicycle/motorcycle parking at the back of the underground parking lot. Elevators are available from the underground parking to the 2nd floor front desk."
},
{
"keywords": ["smoking", "cigarette", "smoke"],
"answer": "There are no cigarette vending machines or smoking areas in the hotel. For smoking areas, we recommend the one at Toride Station (about 3 minutes walk). The hotel has 48 smoking rooms (including twins and deluxe singles) and 72 non-smoking rooms (including twins and deluxe singles). If smoking is detected in a non-smoking room, we may charge for special cleaning fees and compensation for unsold days."
},
{
"keywords": ["non-smoking", "odor", "smell", "room count"],

},
{
"keywords": ["bed", "size", "width", "room type", "roomtype", "room kinds", "roomkinds"],
"answer": "Room sizes: Japanese-style and twin rooms are 24㎡, deluxe single rooms 15.4㎡, single rooms 12㎡. Bed sizes: Twin rooms have two single beds (1030mm × 1970mm), deluxe singles have one double bed (1400mm × 1970mm), singles have one semi-double bed (1230mm × 1970mm). Please inquire in advance if you have any questions."
},
{
"keywords": ["elevator", "stairs", "curfew"],
"answer": "For security reasons, the elevator does not go below the 2nd floor from 0:00 AM to 5:30 AM. If checking in after 0:00 AM, please use the stairs to reach the 2nd floor front desk."
},
{

"answer": "Nearby attractions include Chozenji Temple behind the hotel, Toride Fireworks Festival in summer. Toride Civic Hall hosts various events (concerts, comedy, theater, movies, etc.). Further afield, there are Ushiku Daibutsu, Ushiku Marsh, Tsukuba Expo Center, etc."
},
{
"keywords": ["address", "location"],
"answer": "Our hotel is located at 〒302-0004, 2-4-3 Toride, Toride City, Ibaraki Prefecture, TEL: +81-297-72-1123."
},
{

},
{

},
{

"answer": "The nearest station is JR Toride Station. Exit the East Gate, turn right past Lawson, cross the signal, and proceed right for about 3 minutes. For trains from Ueno/Shinagawa, board the front cars; from Tsuchiura/Mito, the rear cars to be closer to the East Exit. If lost, please call +81-297-72-1123."
},
{
"keywords": ["car", "automobile", "directions", "route"],
"answer": "Set your navigation to 'Central Hotel Toride' or '2-4-3 Toride, Toride City, Ibaraki Prefecture'. From Joban Expressway Yawara IC, about 30 minutes. From Tokyo, after crossing Otone Bridge on Route 6, turn right onto Pref. Route 11; from Mito/Tsuchiura, before Otone Bridge, turn to Tone (Pref. Route 11), pass under Joban Line, turn left at the signal toward Toride Station East Exit, and the hotel is immediately on the right."
},
{
"keywords": ["flat tire", "flattire", "gasoline", "fuel", "refuel"],
"answer": "There is a gas station about 5 minutes by car. Please ask the front desk staff."
},
{
"keywords": ["hospital", "dentist", "fever", "cold", "flu", "corona", "illness", "pain"],
"answer": "For colds, toothaches, etc., we can guide you to nearby hospitals. Larger facilities like JA Toride General Medical Center are available. Please ask the front desk staff."

{

{

function findAnswer(query){
  query = query.toLowerCase();
  const detectedLang = i18next.language || 'ja';
  const baseLang = detectedLang.split('-')[0];
  const lang = faq[detectedLang] ? detectedLang : (faq[baseLang] ? baseLang : 'ja');
  const faqList = faq[lang];
  for(const item of faqList){
    for(const kw of item.keywords){
      if(query.includes(kw.toLowerCase())) return item.answer;
    }
  }
  return i18next.t('noAnswer');
}
const messages = document.getElementById("messages");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
function addBotMessageTypewriter(text){
  const div = document.createElement("div");
  div.className = "msg bot";
  messages.appendChild(div);
  let i = 0;
  const timer = setInterval(()=>{
    div.textContent += text.charAt(i++);
    messages.scrollTop = messages.scrollHeight;
    if(i >= text.length) clearInterval(timer);
  }, 25);
}
function addMessage(msg, isUser=false){
  if(isUser){
    const div = document.createElement("div");
    div.className = "msg user";
    div.textContent = msg;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }else{
    addBotMessageTypewriter(msg);
  }
}
sendBtn.onclick = () => {
  const msg = userInput.value.trim();
  if(!msg) return;
  addMessage(msg, true);
  setTimeout(()=>addMessage(findAnswer(msg)), 100);
  userInput.value = "";
};
userInput.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    e.preventDefault();
    sendBtn.click();
  }
});
let recognition = null;
let isRecording = false;
if(window.SpeechRecognition || window.webkitSpeechRecognition){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.onstart = ()=>{
    isRecording = true;
    micBtn.classList.add("recording");
    micBtn.textContent = "●";
  };
  recognition.onend = recognition.onerror = ()=>{
    isRecording = false;
    micBtn.classList.remove("recording");
    micBtn.textContent = "🎤";
  };
  recognition.onresult = e=>{
    userInput.value = e.results[0][0].transcript;
    sendBtn.click();
  };
}
function startVoice(){
  const ua = navigator.userAgent;
  if(ua.includes("Edg/")){
    alert("Edgeでは音声入力は利用できません。\nChrome または Safari をご利用ください。");
    return;
  }
  if(!recognition){
    alert("このブラウザでは音声入力に対応していません。");
    return;
  }
  if(isRecording) return;
  try{ recognition.start(); }catch(e){}
}
micBtn.onclick = startVoice;
micBtn.addEventListener("pointerdown", e=>{
  e.preventDefault();
  startVoice();
});

    window.location.href = "https://www.centralhoteltoride.com/";
  }, AUTO_CLOSE_TIME);
}
["click","keydown","mousemove","scroll","pointerdown"].forEach(ev=>{

});
