    .bot {

      align-self: flex-start;
    }
    #inputArea {

      padding: 6px;
      gap: 6px;
    }

      padding: 0 12px;

      border-radius: 8px;
      font-size: 16px;

function findAnswer(query){
  query = query.toLowerCase();
  const detectedLang = i18next.language || 'ja';
  const baseLang = detectedLang.split('-')[0];
  const lang = faq[detectedLang] ? detectedLang : (faq[baseLang] ? baseLang : 'ja');
  const faqList = faq[lang];
  for(const item of faqList){
    for(const kw of item.keywords){
      if(query.includes(kw.toLowerCase())) return item.answer;
    }
  }
  return i18next.t('noAnswer');
}
const messages = document.getElementById("messages");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
function addBotMessageTypewriter(text){
  const div = document.createElement("div");
  div.className = "msg bot";
  messages.appendChild(div);
  let i = 0;
  const timer = setInterval(()=>{
    div.textContent += text.charAt(i++);
    messages.scrollTop = messages.scrollHeight;
    if(i >= text.length) clearInterval(timer);
  }, 25);
}
function addMessage(msg, isUser=false){
  if(isUser){
    const div = document.createElement("div");
    div.className = "msg user";
    div.textContent = msg;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }else{
    addBotMessageTypewriter(msg);
  }
}
sendBtn.onclick = () => {
  const msg = userInput.value.trim();
  if(!msg) return;
  addMessage(msg, true);
  setTimeout(()=>addMessage(findAnswer(msg)), 100);
  userInput.value = "";
};
userInput.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    e.preventDefault();
    sendBtn.click();
  }
});
let recognition = null;
let isRecording = false;
if(window.SpeechRecognition || window.webkitSpeechRecognition){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.onstart = ()=>{
    isRecording = true;
    micBtn.classList.add("recording");
    micBtn.textContent = "●";
  };
  recognition.onend = recognition.onerror = ()=>{
    isRecording = false;
    micBtn.classList.remove("recording");
    micBtn.textContent = "🎤";
  };
  recognition.onresult = e=>{
    userInput.value = e.results[0][0].transcript;
    sendBtn.click();
  };
}
function startVoice(){
  const ua = navigator.userAgent;
  if(ua.includes("Edg/")){
    alert("Edgeでは音声入力は利用できません。\nChrome または Safari をご利用ください。");
    return;
  }
  if(!recognition){
    alert("このブラウザでは音声入力に対応していません。");
    return;
  }
  if(isRecording) return;
  try{ recognition.start(); }catch(e){}
}
micBtn.onclick = startVoice;
micBtn.addEventListener("pointerdown", e=>{
  e.preventDefault();
  startVoice();
});

}
["click","keydown","mousemove","scroll","pointerdown"].forEach(ev=>{

    placeholders = t('placeholders', { returnObjects: true });
 
    let phIndex = 0;
    setInterval(() => {
      userInput.placeholder = placeholders[phIndex];
      phIndex = (phIndex + 1) % placeholders.length;
    }, 4000); // 間隔を調整
 
    if (recognition) {
      const lang = i18next.language || 'ja';
      if (lang.startsWith('ja')) {
        recognition.lang = 'ja-JP';
      } else if (lang.startsWith('en')) {
        recognition.lang = 'en-US';
      } else if (lang.startsWith('zh')) {
        recognition.lang = lang;
      } else if (lang.startsWith('vi')) {
        recognition.lang = 'vi-VN';
      } else if (lang.startsWith('th')) {
        recognition.lang = 'th-TH';
      }
    }
  });
</script>
</body>
</html>
