<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
<title>セントラルホテルグループQ&Aチャット</title>

<!-- i18next -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/i18next/25.5.2/i18next.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/i18next-browser-languagedetector/8.2.0/i18nextBrowserLanguageDetector.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; height: 100%;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

#chat-layer {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(4px);
}

#chatbox {
  width: 360px; max-width: 95vw;
  height: 520px; max-height: 75dvh;
  border: 1px solid #ccc;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  position: fixed;
  bottom: 20px; right: 20px;
  background: #fff;
  display: flex; flex-direction: column;
  overflow: hidden;
}

#chatHeader {
  background: #ff8c00; color: #fff;
  padding: 10px;
  font-size: 14px; font-weight: bold;
  display: flex; gap: 8px;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  background: #fafafa;
}

.msg {
  margin: 6px 0;
  padding: 10px 12px;
  border-radius: 10px;
  max-width: 95%;
  word-wrap: break-word;
  font-size: 14px;
}

.user { background: #d1f0d1; align-self: flex-end; }
.bot  { background: #f0f0f0; align-self: flex-start; }

#inputArea {
  position: relative;
  display: flex;
  gap: 6px;
  padding: 6px;
  border-top: 1px solid #ddd;
}

#userInput {
  flex: 1;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
}

#flowPlaceholder {
  position: absolute;
  left: 14px;
  right: 120px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  color: #999;
  white-space: nowrap;
  overflow: hidden;
  pointer-events: none;
}

#flowPlaceholder span {
  display: inline-block;
  padding-left: 100%;
  animation: flowText 18s linear infinite;
}

@keyframes flowText {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

#micBtn, #sendBtn {
  width: 44px; height: 44px;
  border: none; border-radius: 8px;
  background: #ff8c00;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
}
</style>
</head>

<body>

<div id="chat-layer">
  <div id="chatbox">

    <div id="chatHeader">
      <span class="backBtn">◀</span>
      <div data-i18n="chatHeaderText"></div>
    </div>

    <div id="messages"></div>

    <div id="inputArea">
      <div id="flowPlaceholder"></div>
      <input id="userInput" autocomplete="off">
      <button id="micBtn">🎤</button>
      <button id="sendBtn" data-i18n="send">送信</button>
    </div>

  </div>
</div>

<script>
const messages = document.getElementById("messages");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const flow = document.getElementById("flowPlaceholder");

function addMessage(text, user=false){
  const div = document.createElement("div");
  div.className = "msg " + (user ? "user" : "bot");
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

sendBtn.onclick = () => {
  if(!userInput.value.trim()) return;
  addMessage(userInput.value, true);
  userInput.value = "";
  flow.style.display = "block";
};

userInput.addEventListener("input",()=>{
  flow.style.display = userInput.value ? "none" : "block";
});

/* ===== i18next ===== */
i18next
.use(i18nextBrowserLanguageDetector)
.init({
  fallbackLng: 'ja',
  resources: {
    ja: {
      translation: {
        chatHeaderText: '◀ 公式サイトへ<br>セントラルホテル高崎Q&Aチャット',
        send: '送信',
        placeholders: [
          'ご質問を入力してください',
          '音声入力はマイクを押してください',
          'チェックイン・駐車場・食事など',
          'お気軽にお尋ねください',
          'お電話は027-321-7000まで'
        ]
      }
    },
    en: {
      translation: {
        chatHeaderText: '◀ Official Website<br>Central Hotel Takasaki Q&A Chat',
        send: 'Send',
        placeholders: [
          'Please enter your question',
          'Press the microphone for voice input',
          'Ask about check-in, parking, meals',
          'We are happy to assist you',
          'Or call +81-27-321-7000'
        ]
      }
    }
  }
}, (err,t)=>{
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    el.innerHTML = t(el.dataset.i18n);
  });

  const texts = t('placeholders',{returnObjects:true});
  let i = 0;

  function updateFlow(){
    flow.innerHTML = `<span>${texts[i]}</span>`;
    i = (i + 1) % texts.length;
  }
  updateFlow();
  setInterval(updateFlow, 6000);
});
</script>

</body>
</html>
